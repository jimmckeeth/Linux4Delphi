name: Linux4Delphi CI

on:
  push:
    branches: [ main, test** ]
  pull_request:
    branches: [ main, test** ]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: error

  ubuntu_test:
    name: Ubuntu 26.04
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run Setup and Verify PAServer in Ubuntu 26.04
        run: |
          docker run --rm --privileged \
            -e DEBIAN_FRONTEND=noninteractive \
            -v "$PWD:/workspace" \
            ubuntu:26.04 \
            bash -c "
              set -e
              chmod +x /workspace/scripts/SetupLinux4Delphi.sh
              /workspace/scripts/SetupLinux4Delphi.sh 13.1
              /usr/local/bin/pa13.1.sh &
              sleep 15
              pgrep paserver
            "

  rhel_test:
    name: RHEL 10
    runs-on: ubuntu-latest
    container:
      image: redhat/ubi10:latest
    steps:
      - uses: actions/checkout@v5
      - name: Run Setup
        run: |
          chmod +x ./scripts/SetupLinux4Delphi.sh
          ./scripts/SetupLinux4Delphi.sh 13.1
      - name: Verify PAServer
        run: |
          /usr/local/bin/pa13.1.sh &
          sleep 15
          pgrep paserver
